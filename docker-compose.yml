# docker-compose.yml
version: '3.9'

services:

  web:
    build:
      context: .
      dockerfile: Dockerfile          # 你需要创建一个 Dockerfile
    command: daphne -b 0.0.0.0 -p 8000 core.asgi:application      # daphne -e ssl:443:privateKey=server.key:certKey=server.crt core.asgi:application
    
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - db
      - redis
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings
      # 建议使用环境变量文件来管理敏感信息
      # - .env
    restart: unless-stopped

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: online_sells_db
      MYSQL_USER: django_user
      MYSQL_PASSWORD: your_secure_password_123
      MYSQL_ROOT_PASSWORD: root_password_very_secure
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"   # 本地用 3307 避免冲突

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  # 可选：后面正式上线时再打开 nginx
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     - static_volume:/app/staticfiles
  #     - media_volume:/app/media
  #   depends_on:
  #     - web

volumes:
  mysql_data:
  redis_data:
  static_volume:
  media_volume: